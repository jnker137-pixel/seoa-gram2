name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Supabase 아바타 동기화
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install requests --quiet
          python3 - <<'PYEOF'
          import os, requests, base64, re

          SUPABASE_URL = "https://uxiymaeobmleshekvqvl.supabase.co"
          SUPABASE_KEY = os.environ["SUPABASE_KEY"]

          res = requests.get(
              f"{SUPABASE_URL}/rest/v1/characters?select=id,avatar_url",
              headers={"apikey": SUPABASE_KEY, "Authorization": f"Bearer {SUPABASE_KEY}"}
          )
          import os as _os
          _os.makedirs("app/public/avatars", exist_ok=True)
          for char in res.json():
              cid = char["id"]
              av = char.get("avatar_url") or ""
              if not av.startswith("data:image/"):
                  continue
              m = re.match(r"data:image/\w+;base64,(.+)", av)
              if not m:
                  continue
              data = base64.b64decode(m.group(1))
              path = f"app/public/avatars/{cid}.png"
              with open(path, "wb") as f:
                  f.write(data)
              print(f"아바타 저장: {path}")
          PYEOF

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
